    <style>
        body {
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 30px 30px;
        }
        
        .kid-hover-effect {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .kid-hover-effect:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .show-word .en-word {
            display: block;
            animation: bounceIn 0.5s;
        }

        .show-word .vi-word {
            display: none;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.1); opacity: 0; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .animate-pop {
            animation: pop 0.3s ease-in-out;
        }

        /* Tùy chỉnh thanh cuộn cho đẹp */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #10b981;

        }
        ::-webkit-scrollbar-thumb:hover {

        // --- CÁC HÀM TIỆN ÍCH TẠO DỮ LIỆU TỰ ĐỘNG ---

        function ham_doc_so_tieng_anh($so) {
            const $tu_0_den_19 = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
            const $hang_chuc = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];

            if ($so < 20) return $tu_0_den_19[$so];
            if ($so < 100) return $hang_chuc[Math.floor($so / 10)] + ($so % 10 !== 0 ? '-' + $tu_0_den_19[$so % 10].toLowerCase() : '');
            if ($so <= 300) {
                let $chu = $tu_0_den_19[Math.floor($so / 100)] + ' hundred';
                let $phan_du = $so % 100;
                if ($phan_du !== 0) {
                    $chu += ' and ' + ham_doc_so_tieng_anh($phan_du).toLowerCase();
                }
                return $chu.charAt(0).toUpperCase() + $chu.slice(1);
            }
            return '';
        }

        function ham_tao_danh_sach_so() {
            const $mang_mau = [
                'bg-red-50 border-red-200 text-red-600', 'bg-orange-50 border-orange-200 text-orange-600',
                'bg-yellow-50 border-yellow-200 text-yellow-600', 'bg-green-50 border-green-200 text-green-600',
                'bg-blue-50 border-blue-200 text-blue-600', 'bg-indigo-50 border-indigo-200 text-indigo-600',
                'bg-purple-50 border-purple-200 text-purple-600', 'bg-pink-50 border-pink-200 text-pink-600'
            ];
            for (let $so = 1; $so <= 300; $so++) {
                $du_lieu_tu_vung.numbers.push({
                    id: 'num_' + $so,
                    wordEn: ham_doc_so_tieng_anh($so),
                    wordVi: 'Số ' + $so,
                    emoji: $so,
                    color: $mang_mau[($so - 1) % $mang_mau.length]
                });
            }
        }

        function ham_tao_bang_chu_cai() {
            const $bang_chu_cai = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const $mang_mau = [
                'bg-red-50 border-red-200 text-red-600', 'bg-orange-50 border-orange-200 text-orange-600',
                'bg-yellow-50 border-yellow-200 text-yellow-600', 'bg-green-50 border-green-200 text-green-600',
                'bg-blue-50 border-blue-200 text-blue-600', 'bg-indigo-50 border-indigo-200 text-indigo-600',
                'bg-purple-50 border-purple-200 text-purple-600', 'bg-pink-50 border-pink-200 text-pink-600'
            ];
            for (let $i = 0; $i < $bang_chu_cai.length; $i++) {
                let $chu_cai = $bang_chu_cai[$i];
                $du_lieu_tu_vung.alphabet.push({
                    id: 'alpha_' + $chu_cai,
                    wordEn: $chu_cai,
                    wordVi: 'Chữ ' + $chu_cai,
                    emoji: $chu_cai,
                    color: $mang_mau[$i % $mang_mau.length]
                });
            }
        }

        // --- HÀM XỬ LÝ GIAO DIỆN VÀ ÂM THANH ---

        function ham_phat_am($tu_tieng_anh, $phan_tu_html) {
            if ($phan_tu_html) {
                $phan_tu_html.classList.add('animate-pop', 'show-word');
                setTimeout(() => {
                    $phan_tu_html.classList.remove('animate-pop');
                    setTimeout(() => {
                        $phan_tu_html.classList.remove('show-word');
                    }, 2000);
                }, 300);
            }

            if ('speechSynthesis' in window) {
                // Cancel previous speech to avoid overlapping
                window.speechSynthesis.cancel();
                const $giong_doc = new SpeechSynthesisUtterance($tu_tieng_anh);
                $giong_doc.lang = 'en-US';
                $giong_doc.rate = 0.85; 
                $giong_doc.pitch = 1.1; 
                window.speechSynthesis.speak($giong_doc);
            }
        }

        function ham_chuyen_tab($id_tab) {
            document.querySelectorAll('.category-section').forEach($phan => {
                $phan.classList.add('hidden');
            });
            document.querySelectorAll('.nav-btn').forEach($nut => {
                $nut.classList.remove('ring-4', 'ring-opacity-50');
            });
            
            document.getElementById($id_tab).classList.remove('hidden');
            
            const $nut_dang_chon = Array.from(document.querySelectorAll('.nav-btn')).find($nut => $nut.getAttribute('onclick').includes($id_tab));
            if ($nut_dang_chon) {
                $nut_dang_chon.classList.add('ring-4', 'ring-opacity-50');
                if($id_tab === 'animals') $nut_dang_chon.classList.add('ring-blue-400');
                if($id_tab === 'fruits') $nut_dang_chon.classList.add('ring-red-400');
                if($id_tab === 'colors') $nut_dang_chon.classList.add('ring-pink-400');
                if($id_tab === 'numbers') $nut_dang_chon.classList.add('ring-orange-400');
                if($id_tab === 'flags') $nut_dang_chon.classList.add('ring-indigo-400');
                if($id_tab === 'alphabet') $nut_dang_chon.classList.add('ring-purple-400');
                if($id_tab === 'quiz') $nut_dang_chon.classList.add('ring-green-400');
            }

            // Nếu ra khỏi tab quiz, reset lại trạng thái menu quiz
            if($id_tab !== 'quiz') {
                ham_quay_lai_menu_game();
            }
        }

        // --- HÀM XỬ LÝ TRÒ CHƠI (QUIZ) ---
        let $tu_cau_hoi_hien_tai = null;
        let $diem_so = 0;
        let $che_do_choi = 1; // 1: Tìm Hình, 2: Tìm Chữ

        function ham_lay_phan_tu_ngau_nhien($mang, $so_luong) {
            const $mang_sao_chep = [...$mang];
            const $ket_qua = [];
            for (let $i = 0; $i < $so_luong; $i++) {
                if ($mang_sao_chep.length === 0) break;
                const $chi_so = Math.floor(Math.random() * $mang_sao_chep.length);
                $ket_qua.push($mang_sao_chep.splice($chi_so, 1)[0]);
            }
            return $ket_qua;
        }

        function ham_tron_mang($mang) {
            for (let $i = $mang.length - 1; $i > 0; $i--) {
                const $j = Math.floor(Math.random() * ($i + 1));
                [$mang[$i], $mang[$j]] = [$mang[$j], $mang[$i]];
            }
            return $mang;
        }

        function ham_bat_dau_tro_choi($che_do) {
            $che_do_choi = $che_do;
            $diem_so = 0;
            document.getElementById('diem_hien_tai').textContent = $diem_so;
            
            document.getElementById('vung_chon_che_do').classList.add('hidden');
            document.getElementById('vung_cau_hoi').classList.remove('hidden');
            document.getElementById('vung_thong_bao').classList.add('hidden');
            ham_tao_cau_hoi_moi();
        }

        function ham_quay_lai_menu_game() {
            document.getElementById('vung_chon_che_do').classList.remove('hidden');
            document.getElementById('vung_cau_hoi').classList.add('hidden');
            document.getElementById('vung_thong_bao').classList.add('hidden');
        }

        function ham_tao_nhao_nut_dap_an($lua_chon, $loai_hien_thi) {
            const $nut_bam = document.createElement('button');
            
            if ($loai_hien_thi === 'hinh') {
                // Hiển thị Hình/Màu
                if ($lua_chon.hex) {
                    $nut_bam.className = 'h-32 md:h-40 rounded-3xl shadow-md transform hover:scale-105 transition-transform border-4 border-gray-100 hover:border-gray-300';
                    $nut_bam.style.backgroundColor = $lua_chon.hex;
                } else if ($lua_chon.id.startsWith('alpha_') || $lua_chon.id.startsWith('num_')) {
                    $nut_bam.className = `h-32 md:h-40 bg-white rounded-3xl shadow-md transform hover:scale-105 transition-transform text-6xl md:text-7xl font-black border-4 flex items-center justify-center ${$lua_chon.color ? $lua_chon.color.split(' ')[1] : 'border-gray-200'} text-gray-800`;
                    $nut_bam.innerHTML = $lua_chon.emoji;
                } else {
                    $nut_bam.className = 'h-32 md:h-40 bg-white rounded-3xl shadow-md transform hover:scale-105 transition-transform text-6xl md:text-7xl border-4 border-gray-100 hover:border-gray-300 flex items-center justify-center drop-shadow-sm';
                    $nut_bam.textContent = $lua_chon.emoji;
                }
            } else {
                // Hiển thị Chữ
                $nut_bam.className = 'h-24 md:h-32 bg-white rounded-3xl shadow-md transform hover:scale-105 transition-transform text-2xl md:text-4xl font-black text-gray-800 border-4 border-blue-100 hover:border-blue-400 flex items-center justify-center';
                $nut_bam.textContent = $lua_chon.wordEn;
            }
            
            $nut_bam.onclick = () => ham_kiem_tra_ket_qua($lua_chon.id);
            return $nut_bam;
        }

        function ham_tao_cau_hoi_moi() {
            const $vung_thong_bao = document.getElementById('vung_thong_bao');
            $vung_thong_bao.classList.add('hidden');
            $vung_thong_bao.textContent = '';

            // Bỏ đi numbers và alphabet ra khỏi pool cho game nhìn hình tìm chữ (vì chữ và hình giống nhau)
            let $pool_tu_vung = $tat_ca_tu_vung;
            if ($che_do_choi === 2) {
                $pool_tu_vung = [...$du_lieu_tu_vung.animals, ...$du_lieu_tu_vung.fruits, ...$du_lieu_tu_vung.colors, ...$du_lieu_tu_vung.flags];
            }

            // Chọn 1 đáp án đúng
            $tu_cau_hoi_hien_tai = ham_lay_phan_tu_ngau_nhien($pool_tu_vung, 1)[0];
            
            // Chọn 3 đáp án sai
            const $danh_sach_con_lai = $pool_tu_vung.filter($tu => $tu.id !== $tu_cau_hoi_hien_tai.id);
            const $cac_dap_an_sai = ham_lay_phan_tu_ngau_nhien($danh_sach_con_lai, 3);
            
            let $cac_lua_chon = ham_tron_mang([$tu_cau_hoi_hien_tai, ...$cac_dap_an_sai]);
            
            const $vung_de_bai = document.getElementById('de_bai_container');
            const $khung_dap_an = document.getElementById('khung_dap_an');
            $vung_de_bai.innerHTML = '';
            $khung_dap_an.innerHTML = '';

            if ($che_do_choi === 1) {
                // CHẾ ĐỘ 1: ĐỀ BÀI LÀ CHỮ/ÂM THANH - ĐÁP ÁN LÀ HÌNH
                $vung_de_bai.innerHTML = `
                    <button onclick="ham_phat_am_cau_hoi()" class="w-24 h-24 bg-blue-100 hover:bg-blue-200 text-blue-500 rounded-full text-5xl flex items-center justify-center mb-6 shadow-sm transform hover:scale-105 active:scale-95 transition-all">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                    <p class="text-3xl font-bold text-gray-700">Đâu là <span class="text-kid-blue text-4xl font-black mx-2 border-b-4 border-kid-blue border-dotted"> ${$tu_cau_hoi_hien_tai.wordEn} </span> ?</p>
                `;
                
                $cac_lua_chon.forEach($lua_chon => {
                    $khung_dap_an.appendChild(ham_tao_nhao_nut_dap_an($lua_chon, 'hinh'));
                });

            } else {
                // CHẾ ĐỘ 2: ĐỀ BÀI LÀ HÌNH - ĐÁP ÁN LÀ CHỮ
                let $hinh_anh_html = '';
                if ($tu_cau_hoi_hien_tai.hex) {
                    $hinh_anh_html = `<div class="w-32 h-32 rounded-full shadow-lg border-8 border-gray-100 mx-auto" style="background-color: ${$tu_cau_hoi_hien_tai.hex}"></div>`;
                } else {
                    $hinh_anh_html = `<div class="text-9xl drop-shadow-lg mx-auto transform hover:scale-110 transition-transform cursor-pointer" onclick="ham_phat_am_cau_hoi()">${$tu_cau_hoi_hien_tai.emoji}</div>`;
                }

                $vung_de_bai.innerHTML = `
                    ${$hinh_anh_html}
                    <p class="text-2xl font-bold text-gray-600 mt-6">Đây là gì nhỉ?</p>
                    <button onclick="ham_phat_am_cau_hoi()" class="mt-4 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-full font-bold text-sm">
                        <i class="fa-solid fa-volume-high"></i> Nghe gợi ý
                    </button>
                `;

                $cac_lua_chon.forEach($lua_chon => {
                    $khung_dap_an.appendChild(ham_tao_nhao_nut_dap_an($lua_chon, 'chu'));
                });
            }

            // Tự động đọc
            setTimeout(ham_phat_am_cau_hoi, 500);
        }

        function ham_phat_am_cau_hoi() {
            if ($tu_cau_hoi_hien_tai) {
                ham_phat_am($tu_cau_hoi_hien_tai.wordEn, null);
            }
        }

        function ham_kiem_tra_ket_qua($id_duoc_chon) {
            const $vung_thong_bao = document.getElementById('vung_thong_bao');
            $vung_thong_bao.classList.remove('hidden');
            $vung_thong_bao.classList.remove('animate-bounce'); // Reset animation

            if ($id_duoc_chon === $tu_cau_hoi_hien_tai.id) {
                // Đúng
                $diem_so += 10;
                document.getElementById('diem_hien_tai').textContent = $diem_so;
                $vung_thong_bao.innerHTML = '<span class="text-green-500 drop-shadow-sm"><i class="fa-solid fa-star text-yellow-400"></i> Giỏi quá! Chính xác rồi! <i class="fa-solid fa-star text-yellow-400"></i></span>';
                $vung_thong_bao.classList.add('animate-bounce');

                // Âm thanh vỗ tay (dùng speech tạo cảm giác vui nhộn)
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const $loi_chuc = new SpeechSynthesisUtterance("Excellent!");
                    $loi_chuc.lang = 'en-US';
                    $loi_chuc.pitch = 1.5;
                    $loi_chuc.rate = 1.2;
                    window.speechSynthesis.speak($loi_chuc);
                }
                
                setTimeout(ham_tao_cau_hoi_moi, 2000); // Đợi 2s để bé kịp nhìn lời khen
            } else {
                // Sai
                $vung_thong_bao.innerHTML = '<span class="text-red-500 drop-shadow-sm"><i class="fa-solid fa-face-frown-open"></i> Chưa đúng rồi, bé thử lại nhé!</span>';
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const $loi_dong_vien = new SpeechSynthesisUtterance("Oops! Try again.");
                    $loi_dong_vien.lang = 'en-US';
                    $loi_dong_vien.pitch = 1.2;
                    window.speechSynthesis.speak($loi_dong_vien);
                }
