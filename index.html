<!DOCTYPE html>
<html lang="vi">
<head>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Quicksand', 'sans-serif'] },
                    colors: {
                        'k-blue': '#3b82f6', 'k-pink': '#ec4899', 'k-green': '#10b981',
                        'k-yellow': '#f59e0b', 'k-orange': '#f97316', 'k-purple': '#8b5cf6', 'k-red': '#ef4444',
                        'k-cyan': '#06b6d4',
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.1)',
                        'neo': '8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff',
                        'neo-inset': 'inset 6px 6px 10px 0 rgba(0, 0, 0, 0.1), inset -6px -6px 10px 0 rgba(255, 255, 255, 0.8)',
                        'deep': '0 10px 25px -5px rgba(0, 0, 0, 0.2), 0 8px 10px -6px rgba(0, 0, 0, 0.1)',
                        '3d': '0 6px 0px 0px rgba(0, 0, 0, 0.1), 0 15px 20px rgba(0,0,0,0.15)',
                    },
                    animation: {
                        'blob': 'blob 10s infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                        'spin-slow': 'spin 8s linear infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        wiggle: { '0%, 100%': { transform: 'rotate(-3deg)' }, '50%': { transform: 'rotate(3deg)' } }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #e0f2fe;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* Animated Background Elements */
        .bg-shapes { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: linear-gradient(135deg, #e0f2fe 0%, #fdf4ff 100%); }
        .shape { position: absolute; filter: blur(40px); opacity: 0.6; animation: blob 15s infinite alternate; }
        .shape-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background-color: #bae6fd; animation-delay: 0s; }
        .shape-2 { top: 40%; right: -20%; width: 40vw; height: 40vw; background-color: #fbcfe8; animation-delay: 2s; }
        .shape-3 { bottom: -20%; left: 20%; width: 60vw; height: 60vw; background-color: #bbf7d0; animation-delay: 4s; }

        /* 3D Flip Card - Enhanced */
        .flip-card { perspective: 1000px; cursor: pointer; height: 100%; min-height: 160px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2), 0 8px 10px -6px rgba(0, 0, 0, 0.1); border: 4px solid white; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); transition: box-shadow 0.3s; }
        .flip-card:hover .flip-card-front { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1); transform: translateY(-5px); }
        .flip-card-back { transform: rotateY(180deg); background: linear-gradient(135deg, #fffbeb, #fef3c7); border: 4px dashed #fcd34d; }

        /* Memory Game Cards */
        .mem-card { perspective: 1000px; cursor: pointer; aspect-ratio: 1/1; }
        .mem-card-inner { width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; position: relative;}
        .mem-card.flipped .mem-card-inner { transform: rotateY(180deg); }
        .mem-front, .mem-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 1rem; display: flex; justify-content: center; align-items: center; font-size: 3rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mem-front { background: linear-gradient(45deg, #3b82f6, #8b5cf6); border: 3px solid white; color: white; }
        .mem-front::after { content: '?'; font-weight: 900; }
        .mem-back { background: white; transform: rotateY(180deg); border: 3px solid #e5e7eb; }

        /* Drawing Canvas */
        #draw_canvas { border-radius: 1.5rem; background-color: transparent; cursor: crosshair; touch-action: none; z-index: 10; position: relative;}
        .canvas-bg-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 15rem; opacity: 0.1; font-weight: 900; z-index: 0; pointer-events: none; user-select: none; color: #94a3b8;}

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Hide Scrollbar for Horizontal Menus */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

        // Hàm tiện ích tự sinh data
        function ham_doc_so($so) {
            const t1=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
            const t10=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
            if($so<20) return t1[$so];
            if($so<100) return t10[Math.floor($so/10)] + ($so%10 ? '-'+t1[$so%10].toLowerCase() : '');
            return '100+'; // Giới hạn cho nhẹ mảng
        }

        function ham_khoi_tao_data_tu_dong() {
            const m = ['text-red-500','text-orange-500','text-yellow-500','text-green-500','text-blue-500','text-purple-500','text-pink-500'];
            for(let i=1; i<=30; i++) {
                $du_lieu.numbers.push({ id:'n_'+i, en:ham_doc_so(i), vi:'Số '+i, emj:i, color:m[i%m.length] });
            }
            const az = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            for(let i=0; i<az.length; i++) {
                $du_lieu.alphabet.push({ id:'a_'+az[i], en:az[i], vi:'Chữ '+az[i], emj:az[i], color:m[i%m.length] });
            }
            // Mảng gom cho Game
            $tat_ca_tu = [
                ...$du_lieu.family, ...$du_lieu.animals, ...$du_lieu.fruits, ...$du_lieu.colors, ...$du_lieu.vehicles, 
                ...$du_lieu.clothes, ...$du_lieu.body, ...$du_lieu.food, ...$du_lieu.jobs, ...$du_lieu.house,
                ...$du_lieu.school, ...$du_lieu.sports, ...$du_lieu.vegetables, ...$du_lieu.space, ...$du_lieu.weather
            ];
            
            // Xử lý logic Streak
            const homNay = new Date().toDateString();
            if ($ngay_cuoi_hoc !== homNay) {
                const homQua = new Date();
                homQua.setDate(homQua.getDate() - 1);
                if ($ngay_cuoi_hoc === homQua.toDateString()) {
                    $tong_streak += 1;
                } else if ($ngay_cuoi_hoc !== '') {
                    $tong_streak = 1; // Mất streak
                }
                $ngay_cuoi_hoc = homNay;
                localStorage.setItem('vutru_streak', $tong_streak);
                localStorage.setItem('vutru_last_day', $ngay_cuoi_hoc);
            }
        }

            if(newLevel > $level_hien_tai) {

        function ham_toggle_nhac_nen() {

            else { bgm.volume = 0.15; bgm.play(); btn.innerHTML = '<i class="fa-solid fa-music"></i>'; btn.classList.add('text-pink-500'); }
            $nhac_nen_bat = !$nhac_nen_bat;

        function ham_phat_sfx($id) {
            const a = document.getElementById('audio_'+$id);
            if(a) { a.currentTime=0; a.volume=0.6; a.play().catch(()=>{}); }
        }

        let $giong_doc_en = null;
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {
                const voices = window.speechSynthesis.getVoices();
                $giong_doc_en = voices.find(v => v.name.includes('Google US English')) 
                             || voices.find(v => v.lang.includes('en-US') && v.name.includes('Female'))
                             || voices.find(v => v.lang === 'en-US' || v.lang === 'en-GB');
            };
        }

        function ham_phat_am($tu, $toc_do = 0.85) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance($tu);
                msg.lang = 'en-US'; 
                
                // Fallback nếu onvoiceschanged chưa kịp chạy
                if(!$giong_doc_en) {
                    const voices = window.speechSynthesis.getVoices();
                    $giong_doc_en = voices.find(v => v.name.includes('Google US English')) || voices.find(v => v.lang === 'en-US');
                }
                
                if($giong_doc_en) msg.voice = $giong_doc_en;
                msg.rate = $toc_do; msg.pitch = 1.1;
                window.speechSynthesis.speak(msg);
            }
        }

        function ham_phao_hoa($x, $y) {
            confetti({ particleCount: 40, spread: 60, origin: { x: $x, y: $y }, colors: ['#fadd02', '#f472b6', '#3b82f6', '#10b981'], zIndex: 9999 });
        }

        function ham_phao_hoa_lon() {
            var duration = 3 * 1000; var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, zIndex: 9999 });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, zIndex: 9999 });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        // Render thẻ học 3D siêu VIP
        function ham_tao_the_3D($item, $themeClass) {
            let frontContent = '';
            if ($item.hex) {

                let code = $item.id.replace('fl_', '');
                if (code === 'uk') code = 'gb'; // Xử lý mã quốc gia đặc biệt cho cờ Anh
                frontContent = `<img src="https://flagcdn.com/w160/${code}.png" alt="${$item.en}" class="w-24 h-auto rounded-lg shadow-[0_8px_15px_rgba(0,0,0,0.15)] border-2 border-white object-cover transform transition-transform duration-300 group-hover:scale-110">`;
            } else {
                frontContent = `<div class="text-7xl md:text-8xl drop-shadow-lg transform transition-transform duration-300 group-hover:scale-110 group-hover:rotate-6">${$item.emj}</div>`;
            }
            
            return `
                <div class="flip-card group" onclick="ham_lat_the(this, '${$item.en}', event)">
                    <div class="flip-card-inner">
                        <div class="flip-card-front overflow-hidden">
                            ${frontContent}
                            <div class="absolute inset-0 bg-gradient-to-tr from-white/10 to-transparent pointer-events-none"></div>
                            <div class="absolute bottom-2 right-2 text-gray-300"><i class="fa-solid fa-rotate animate-pulse"></i></div>
                        </div>

                            <p class="text-sm font-bold text-gray-500 bg-white/50 px-3 py-1 rounded-full mt-2">${$item.vi}</p>
                            <button onclick="event.stopPropagation(); ham_phat_am('${$item.en}', 0.4)" class="mt-3 text-xs bg-white text-gray-600 shadow-sm px-3 py-1.5 rounded-full font-bold hover:bg-gray-100 hover:text-green-600 transition-colors"><i class="fa-solid fa-turtle text-green-500"></i> Đọc chậm</button>
                        </div>
                    </div>
                </div>`;
        }

        function ham_lat_the($el, $tu, e) {
            if(e.target.tagName === 'BUTTON') return; // Bỏ qua nếu bấm nút đọc chậm
            const isFlipped = $el.classList.contains('flipped');
            // Úp tất cả thẻ khác
            document.querySelectorAll('.flip-card').forEach(c => c.classList.remove('flipped'));
            if(!isFlipped) {
                $el.classList.add('flipped');
                ham_phat_am($tu);
                const rect = $el.getBoundingClientRect();
                ham_phao_hoa((rect.left + rect.width/2)/window.innerWidth, (rect.top + rect.height/2)/window.innerHeight);
            }
        }

        // --- STREAMING_CHUNK:Game Engine Core... ---
        let $game_id = '';
        let $game_diem_session = 0;
        let $game_cau_hoi = null;

        function ham_ngau_nhien($mang, $sl) { return [...$mang].sort(()=>Math.random()-0.5).slice(0,$sl); }
        function ham_tron($mang) { return [...$mang].sort(()=>Math.random()-0.5); }

        function ham_khoi_tao_game($id) {
            $game_id = $id; $game_diem_session = 0;
            document.getElementById('game_session_score').innerText = $game_diem_session;
            document.getElementById('game_menu').classList.add('hidden');
            document.getElementById('game_play_area').classList.remove('hidden');
            
            const titles = { 'tim_hinh':'Nghe & Chọn', 'tim_chu':'Đoán Chữ', 'keo_tha':'Ghép Chữ', 'lat_hinh':'Memory Match', 'tap_viet':'Bảng Tập Tô' };
            document.getElementById('game_title').innerText = titles[$id];
            
            ham_load_man_game();
        }

        function ham_thoat_game() {
            document.getElementById('game_menu').classList.remove('hidden');
            document.getElementById('game_play_area').classList.add('hidden');
            document.getElementById('game_board').innerHTML = '';
        }

        function ham_bao_ket_qua($isWin) {
            const overlay = document.getElementById('game_feedback_overlay');
            const msg = document.getElementById('feedback_msg');
            overlay.classList.remove('hidden');
            
            if($isWin) {
                msg.innerHTML = '<i class="fa-solid fa-star text-yellow-400"></i> PERFECT!';
                msg.className = 'text-6xl md:text-8xl font-black text-green-500 drop-shadow-xl transform scale-110 transition-transform';
                ham_phat_sfx('correct'); ham_cong_diem(5); $game_diem_session+=5;
                document.getElementById('game_session_score').innerText = $game_diem_session;
            } else {
                msg.innerHTML = '<i class="fa-solid fa-face-sad-tear text-blue-400"></i> OOPS!';
                msg.className = 'text-6xl md:text-8xl font-black text-red-500 drop-shadow-xl transform scale-100 transition-transform animate-wiggle';
                ham_phat_sfx('wrong');
            }

            setTimeout(() => {
                msg.classList.replace('scale-110','scale-0') || msg.classList.replace('scale-100','scale-0');
                setTimeout(() => { overlay.classList.add('hidden'); if($isWin && !['lat_hinh', 'tap_viet'].includes($game_id)) ham_load_man_game(); }, 300);
            }, 1200);
        }

        function ham_load_man_game() {
            const b = document.getElementById('game_board');
            b.innerHTML = ''; b.className = 'flex-grow w-full flex flex-col items-center justify-center relative'; // reset class
            
            if($game_id === 'tim_hinh') ham_game_tim_hinh(b);
            else if($game_id === 'tim_chu') ham_game_tim_chu(b);
            else if($game_id === 'keo_tha') ham_game_keo_tha(b);
            else if($game_id === 'lat_hinh') ham_game_memory(b);
            else if($game_id === 'tap_viet') ham_game_tap_viet(b);
            else if($game_id === 'danh_van') ham_game_danh_van(b);
            else if($game_id === 'noi_tu') ham_game_noi_tu(b);
            else if($game_id === 'trac_nghiem') ham_game_trac_nghiem(b);
        }

        function ham_game_tim_hinh(b) {
            $game_cau_hoi = ham_ngau_nhien($tat_ca_tu, 1)[0];
            const ops = ham_tron([$game_cau_hoi, ...ham_ngau_nhien($tat_ca_tu.filter(x=>x.id!==$game_cau_hoi.id), 3)]);
            
            b.innerHTML = `

        // --- STREAMING_CHUNK:Minigame 3 (Drag & Drop)... ---
        function ham_game_keo_tha(b) {
            const tu_chon = ham_ngau_nhien($tat_ca_tu, 3);
            const chu_cai = ham_tron([...tu_chon]);
            
            let html = `<div class="w-full max-w-2xl flex flex-col gap-10">
                <div class="flex justify-around w-full">
                    ${tu_chon.map(t => `
                        <div class="flex flex-col items-center">
                            <div class="text-7xl drop-shadow-md mb-2 pointer-events-none">${t.emj || `<div class="w-16 h-16 rounded-full" style="background:${t.hex}"></div>`}</div>
                            <div class="dd-drop w-32 h-16 border-4 border-dashed border-gray-300 rounded-2xl bg-gray-50 flex items-center justify-center text-gray-400 font-bold" data-id="${t.id}">Thả vào đây</div>
                        </div>`).join('')}
                </div>
                <div class="flex justify-center flex-wrap gap-4 bg-orange-50/50 p-6 rounded-3xl border border-orange-100" id="dd_drag_zone">
                    ${chu_cai.map(t => `<div class="dd-drag bg-white px-6 py-3 border-4 border-orange-300 rounded-2xl shadow-sm text-xl font-black text-orange-600 cursor-grab active:cursor-grabbing select-none" data-id="${t.id}" onclick="ham_phat_am('${t.en}')">${t.en}</div>`).join('')}
                </div>
            </div>`;
            b.innerHTML = html; b.dataset.matched = 0;
            
            // Xử lý Mouse + Touch logic (Simplified for Single File robustness)
            let dragged = null; let oX=0, oY=0;
            const drops = b.querySelectorAll('.dd-drop');
            const drags = b.querySelectorAll('.dd-drag');

            drags.forEach(d => {
                d.onmousedown = d.ontouchstart = (e) => {
                    if(d.dataset.locked) return;
                    e.preventDefault(); dragged = d;
                    const evt = e.touches ? e.touches[0] : e;
                    const rect = d.getBoundingClientRect();
                    oX = evt.clientX - rect.left; oY = evt.clientY - rect.top;
                    d.style.position = 'fixed'; d.style.zIndex = 1000;
                    d.style.width = rect.width+'px'; // Giữ kích thước
                    moveAt(evt.clientX, evt.clientY);
                };
            });

            document.onmousemove = document.ontouchmove = (e) => {
                if(!dragged) return;
                const evt = e.touches ? e.touches[0] : e;
                moveAt(evt.clientX, evt.clientY);
            };

            document.onmouseup = document.ontouchend = (e) => {
                if(!dragged) return;
                const evt = e.changedTouches ? e.changedTouches[0] : e;
                dragged.style.position = 'static'; dragged.style.zIndex = 1; dragged.style.width='auto';
                
                // Ktra va chạm thủ công
                let hitDrop = null;
                drops.forEach(drop => {
                    const r = drop.getBoundingClientRect();
                    if(evt.clientX>r.left && evt.clientX<r.right && evt.clientY>r.top && evt.clientY<r.bottom) hitDrop = drop;
                });

                if(hitDrop && hitDrop.dataset.id === dragged.dataset.id) {
                    // Match!
                    ham_phat_sfx('pop');
                    hitDrop.innerHTML = ''; hitDrop.appendChild(dragged);
                    dragged.dataset.locked = 'true'; dragged.style.pointerEvents = 'none';
                    dragged.className = 'bg-green-100 px-6 py-3 border-4 border-green-400 rounded-xl text-xl font-black text-green-700 w-full h-full flex items-center justify-center';
                    hitDrop.className = 'w-32 h-16 rounded-2xl shadow-neo border-0';
                    ham_phat_am(dragged.innerText);
                    
                    b.dataset.matched++;
                    if(b.dataset.matched == 3) setTimeout(()=>ham_bao_ket_qua(true), 1000);
                } else {
                    ham_phat_sfx('wrong'); // Sai, tự rớt về
                    document.getElementById('dd_drag_zone').appendChild(dragged);
                }
                dragged = null;
            };

            function moveAt(pageX, pageY) {
                dragged.style.left = pageX - oX + 'px';
                dragged.style.top = pageY - oY + 'px';
            }
        }

        // --- STREAMING_CHUNK:Premium Game 4 (Memory Match)... ---
        function ham_game_memory(b) {
            b.className = 'flex-grow w-full max-w-2xl mx-auto flex items-center justify-center'; // Giới hạn width
            const sl_cap = window.innerWidth < 600 ? 6 : 8; // Responsive số thẻ
            const tuples = ham_ngau_nhien($tat_ca_tu, sl_cap);
            const cards = ham_tron([...tuples, ...tuples]); // Nhân đôi để tạo cặp
            
            b.innerHTML = `<div class="grid grid-cols-3 sm:grid-cols-4 gap-3 md:gap-4 w-full" id="mem_grid"></div>`;
            const grid = document.getElementById('mem_grid');
            
            cards.forEach((c, idx) => {
                const el = document.createElement('div');
                el.className = 'mem-card'; el.dataset.id = c.id;
                el.innerHTML = `
                    <div class="mem-card-inner">
                        <div class="mem-front text-2xl shadow-neo"></div>
                        <div class="mem-back shadow-neo">${c.hex ? `<div class="w-3/4 h-3/4 rounded-full" style="background:${c.hex}"></div>` : c.emj}</div>
                    </div>`;
                el.onclick = () => handleMemClick(el, c.en);
                grid.appendChild(el);
            });

            let firstCard = null, secondCard = null, lock = false, pairs = 0;

            function handleMemClick(el, word) {
                if(lock || el === firstCard || el.classList.contains('matched')) return;
                el.classList.add('flipped'); ham_phat_sfx('pop');
                
                if(!firstCard) { firstCard = el; return; }
                
                secondCard = el; lock = true;
                if(firstCard.dataset.id === secondCard.dataset.id) {
                    // Đúng cặp
                    setTimeout(()=>{ ham_phat_am(word); ham_phao_hoa_nho(firstCard); ham_phao_hoa_nho(secondCard); }, 300);
                    firstCard.classList.add('matched'); secondCard.classList.add('matched');
                    firstCard = null; secondCard = null; lock = false;
                    pairs++;
                    if(pairs === sl_cap) setTimeout(()=>{ ham_bao_ket_qua(true); }, 1500);
                } else {
                    // Sai
                    setTimeout(() => {
                        firstCard.classList.remove('flipped'); secondCard.classList.remove('flipped');
                        firstCard = null; secondCard = null; lock = false;
                        ham_phat_sfx('wrong');
                    }, 1000);
                }
            }
        }
        function ham_phao_hoa_nho($el) {
            const rect = $el.getBoundingClientRect();
            confetti({ particleCount: 15, spread: 40, origin:{ x: (rect.left+rect.width/2)/window.innerWidth, y: (rect.top+rect.height/2)/window.innerHeight }, zIndex:999});
        }

        // --- STREAMING_CHUNK:Premium Game 5 (Canvas Drawing Pad)... ---
        function ham_game_tap_viet(b) {
            const item = ham_ngau_nhien([...$du_lieu.alphabet, ...$du_lieu.numbers], 1)[0];
            
            b.innerHTML = `
                <div class="w-full flex justify-between mb-4 z-20">
                    <div class="flex gap-2">
                        <button class="w-10 h-10 rounded-full bg-black border-4 border-white shadow-md color-btn ring-4 ring-gray-300" data-c="#000"></button>
                        <button class="w-10 h-10 rounded-full bg-red-500 border-4 border-white shadow-md color-btn" data-c="#ef4444"></button>
                        <button class="w-10 h-10 rounded-full bg-blue-500 border-4 border-white shadow-md color-btn" data-c="#3b82f6"></button>
                        <button class="w-10 h-10 rounded-full bg-green-500 border-4 border-white shadow-md color-btn" data-c="#10b981"></button>
                    </div>
                    <button id="btn_clear_canvas" class="px-4 py-2 bg-gray-200 text-gray-700 font-bold rounded-xl shadow-sm hover:bg-gray-300"><i class="fa-solid fa-eraser"></i> Xóa</button>
                </div>
                <div class="relative w-full h-[300px] md:h-[400px] bg-white border-4 border-dashed border-gray-300 rounded-[2rem] overflow-hidden flex-grow shadow-inner">
                    <div class="canvas-bg-hint text-gray-200 font-sans tracking-tighter">${item.en}</div>
                    <canvas id="draw_canvas" class="absolute top-0 left-0 w-full h-full"></canvas>
                </div>
                <button onclick="ham_bao_ket_qua(true)" class="mt-4 px-8 py-3 bg-cyan-500 text-white font-black text-xl rounded-2xl shadow-[0_4px_0_0_#0891b2] hover:translate-y-1 hover:shadow-none transition w-full max-w-sm mx-auto"><i class="fa-solid fa-check"></i> Hoàn Thành!</button>
            `;
            ham_phat_am(item.en);

            // Canvas Logic
            const cvs = document.getElementById('draw_canvas');
            const ctx = cvs.getContext('2d');
            let isDrawing = false; let color = '#000'; let lw = 12;

            function resize() { cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight; }
            window.addEventListener('resize', resize); resize();

            // Color Picker logic
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('ring-4', 'ring-gray-300'));
                    btn.classList.add('ring-4', 'ring-gray-300');
                    color = btn.dataset.c;
                };
            });

            document.getElementById('btn_clear_canvas').onclick = () => ctx.clearRect(0,0,cvs.width,cvs.height);

            // Draw functions
            function getPos(e) {
                const rect = cvs.getBoundingClientRect();
                const evt = e.touches ? e.touches[0] : e;
                return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
            }

            const start = (e) => { e.preventDefault(); isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            const move = (e) => { if(!isDrawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=lw; ctx.strokeStyle=color; ctx.stroke(); };
            const stop = (e) => { isDrawing = false; };

            cvs.onmousedown = start; cvs.ontouchstart = start;
            cvs.onmousemove = move; cvs.ontouchmove = move;
            cvs.onmouseup = stop; cvs.onmouseout = stop; cvs.ontouchend = stop;
        }

        // --- STREAMING_CHUNK:App Initialization... ---
        window.onload = () => {
            ham_khoi_tao_data_tu_dong();
            ham_render_tat_ca();
            ham_cap_nhat_ui_he_thong();
            ham_chuyen_tab('animals'); // Default tab
            
            // Audio unlock for Mobile Safari/Chrome
            document.body.addEventListener('touchstart', function() {
                ['audio_correct','audio_wrong','audio_pop','audio_win','audio_level_up'].forEach(id=>{
                    let a = document.getElementById(id); if(a) { a.load(); a.volume=0; a.play().then(()=>a.pause()).catch(e=>{}); }
                });
            }, {once:true});
        };
    </script>
</body>
